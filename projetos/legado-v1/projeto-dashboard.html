<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard de Cliente | Legado</title>
  <style>
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #0f162d; color: #e8ebff; }
    header { background: #1f2e7e; color: white; padding: 1rem; text-align: center; }
    main { width: min(93%, 960px); margin: 1rem auto; }
    section { background: #172758; border-radius: 12px; padding: 1rem; margin: .7rem 0; }
    ul { display: flex; gap: .5rem; list-style: none; padding: 0; flex-wrap: wrap; }
    li { background: #1f2e7e; padding: .5rem 1rem; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: .5rem; }
    th, td { border: 1px solid #2f4894; padding: .45rem; text-align: left; }
    button { border: 0; background: #3f5fe1; color: #fff; border-radius: 7px; padding: .4rem .75rem; cursor: pointer; }
    .back { display: inline-block; color: #8ab1ff; margin-bottom: .7rem; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <a class="back" href="../../index.html">← Voltar ao portfólio</a>
  </main>
  <header>
    <h1>Dashboard de Cliente (Legado)</h1>
    <p>Painel interativo de métricas.</p>
  </header>
  <main>
    <section>
      <h2>Métricas</h2>
      <ul>
        <li>Leads: <span id="leads">120</span></li>
        <li>Vendas: <span id="sales">34</span></li>
        <li>Conversão: <span id="rate">28%</span></li>
      </ul>
      <button id="sim">Simular venda</button>
    </section>
    <section>
      <h2>Relatório</h2>
      <table>
        <thead>
          <tr><th>Data</th><th>Leads</th><th>Vendas</th></tr>
        </thead>
        <tbody id="tableBody">
          <tr><td>19/03/2026</td><td>15</td><td>4</td></tr>
          <tr><td>20/03/2026</td><td>20</td><td>6</td></tr>
        </tbody>
      </table>
    </section>
  </main>
  <script>
    const leads = document.getElementById("leads");
    const sales = document.getElementById("sales");
    const rate = document.getElementById("rate");
    const tbody = document.getElementById("tableBody");
    document.getElementById("sim").addEventListener("click", () => {
      const nextLeads = Number(leads.textContent) + 1;
      const nextSales = Number(sales.textContent) + 1;
      leads.textContent = String(nextLeads);
      sales.textContent = String(nextSales);
      rate.textContent = `${Math.round((nextSales / nextLeads) * 100)}%`;
      const row = document.createElement("tr");
      row.innerHTML = `<td>${new Date().toLocaleDateString("pt-BR")}</td><td>${nextLeads}</td><td>${nextSales}</td>`;
      tbody.appendChild(row);
    });
  </script>
</body>
</html>
