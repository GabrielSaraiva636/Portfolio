<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Curso Online | Legado</title>
  <style>
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #101f44; color: #edf2ff; }
    header { background: #1d4ed8; color: white; padding: 1rem; text-align: center; }
    main { width: min(93%, 960px); margin: 1rem auto; }
    section { background: #1a265a; border-radius: 12px; padding: 1rem; margin: .7rem 0; }
    label, input, button, select { font: inherit; border-radius: 7px; border: 1px solid #3f5acb; padding: .45rem; width: 100%; margin-top: .3rem; }
    button { background: #3f5acb; color: #fff; border: none; cursor: pointer; }
    ul { margin-left: 1rem; }
    .back { display: inline-block; color: #9bc2ff; margin-bottom: .7rem; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <a class="back" href="../../index.html">← Voltar ao portfólio</a>
  </main>
  <header>
    <h1>Curso Online (Legado)</h1>
    <p>Landing com cadastro e prova de conceito.</p>
  </header>
  <main>
    <section>
      <h2>O curso</h2>
      <ul>
        <li>HTML/CSS</li>
        <li>JavaScript</li>
        <li>Projeto real</li>
      </ul>
    </section>
    <section>
      <h2>Inscrição</h2>
      <form id="courseForm">
        <label>Nome<input id="nome" /></label>
        <label>Email<input id="email" type="email" /></label>
        <label>Turma
          <select id="turma">
            <option>Manhã</option>
            <option>Tarde</option>
            <option>Noite</option>
          </select>
        </label>
        <button type="submit">Inscrever</button>
      </form>
      <p id="courseMsg" style="color:#a9ffce"></p>
    </section>
  </main>
  <script>
    document.getElementById("courseForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const nome = document.getElementById("nome").value;
      document.getElementById("courseMsg").textContent = nome
        ? `Obrigado ${nome}, inscrição realizada!`
        : "Preencha o nome.";
    });
  </script>
</body>
</html>
