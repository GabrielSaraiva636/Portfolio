<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projeto Terapeuta Fran | Legado</title>
  <style>
    body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #f4f6ff; color: #101c3c; }
    header { background: #3b4fd8; color: #fff; padding: 1rem; text-align: center; }
    main { width: min(93%, 960px); margin: 1rem auto; }
    section { background: #fff; border-radius: 12px; padding: 1rem; margin: .7rem 0; box-shadow: 0 8px 20px rgba(0,0,0,.08); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
    label { display: block; margin: .35rem 0; font-size: .9rem; }
    input, textarea, select, button { width: 100%; padding: .5rem; border: 1px solid #c6d3ff; border-radius: 8px; font-family: inherit; margin-top: .2rem; }
    button { background: #3b4fd8; color: #fff; border: none; cursor: pointer; }
    ul { margin: .5rem 0 0 1rem; }
    .back { display: inline-block; color: #5d6fd3; margin-bottom: .7rem; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <a class="back" href="../../index.html">← Voltar ao portfólio</a>
  </main>
  <header>
    <h1>Terapeuta Fran (Legado)</h1>
    <p>Site real com agendamento interativo</p>
  </header>
  <main>
    <section>
      <h2>Serviços</h2>
      <ul>
        <li>Terapia Individual</li>
        <li>Terapia de Casal</li>
        <li>Acompanhamento emocional</li>
      </ul>
    </section>
    <section class="grid">
      <div>
        <h3>Agendar consulta</h3>
        <form id="bookForm">
          <label>Nome<input id="nome" required /></label>
          <label>Email<input id="email" type="email" required /></label>
          <label>Dia
            <select id="dia">
              <option>Segunda</option>
              <option>Quarta</option>
              <option>Sexta</option>
            </select>
          </label>
          <button type="submit">Enviar</button>
        </form>
        <p id="msg" style="margin-top:.6rem;color:#1860b9;"></p>
      </div>
      <div>
        <h3>Agenda atual</h3>
        <ul id="agendaList">
          <li>Segunda - 14:00 - Maria</li>
          <li>Quarta - 18:00 - João</li>
        </ul>
      </div>
    </section>
  </main>
  <script>
    const form = document.getElementById("bookForm");
    const agenda = document.getElementById("agendaList");
    const msg = document.getElementById("msg");
    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const nome = document.getElementById("nome").value.trim();
      const dia = document.getElementById("dia").value;
      if (!nome) {
        msg.textContent = "Preencha o nome.";
        return;
      }
      const item = document.createElement("li");
      item.textContent = `${dia} - 19:00 - ${nome}`;
      agenda.appendChild(item);
      msg.textContent = "Consulta registrada.";
      form.reset();
    });
  </script>
</body>
</html>
